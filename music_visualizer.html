<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Mortek Music Visualizer — Create music videos with custom visuals, particles, and color schemes.">
<meta name="theme-color" content="#0d0d18">
<title>Music Visualizer — Mortek</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d18;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;gap:14px}
h1{font-size:17px;font-weight:600;color:#c4a0ff;letter-spacing:1px}
canvas{border-radius:10px;max-width:100%;box-shadow:0 0 30px #0005}
.panel{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center}
.upload-btn{display:inline-flex;align-items:center;gap:6px;background:#1e1e3a;border:1.5px dashed #555;color:#ccc;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;transition:border-color .2s,background .2s}
.upload-btn:hover{border-color:#a07fff;background:#2a2a4a}
.upload-btn.loaded{border-color:#5cb85c;border-style:solid;color:#7ddb7d}
input[type=file]{display:none}
.ctrl{display:flex;flex-direction:column;gap:3px;align-items:center}
.ctrl label{font-size:11px;color:#888}
select{background:#1a1a30;border:1px solid #444;color:#ddd;border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer}
select:hover{border-color:#a07fff}
.ctrl-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:6px 10px;background:#111128;border-radius:10px;border:1px solid #2a2a44}
.dl-btn{background:linear-gradient(135deg,#6c3fc5,#4a90d9);border:none;color:#fff;padding:10px 28px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;letter-spacing:.5px;transition:opacity .2s}
.dl-btn:hover{opacity:.85}
.dl-btn:disabled{opacity:.4;cursor:not-allowed}
#status{font-size:12px;color:#888;min-height:16px}
.progress-bar{width:300px;height:6px;background:#1e1e3a;border-radius:3px;overflow:hidden;display:none}
.progress-fill{height:100%;background:linear-gradient(90deg,#6c3fc5,#4a90d9);width:0%;transition:width .3s}
.sm-btn{background:#1e1e3a;border:1px solid #444;color:#ccc;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:border-color .2s,background .2s}
.sm-btn:hover{border-color:#a07fff;background:#2a2a4a}
</style>
</head>
<body>
<h1>MORTEK MUSIC — VISUALIZER</h1>

<div class="panel">
  <label class="upload-btn" id="imgLabel" for="imgInput">+ Load Image</label>
  <input type="file" id="imgInput" accept="image/*">
  <label class="upload-btn" id="audioLabel" for="audioInput">+ Load Audio</label>
  <input type="file" id="audioInput" accept="audio/*">
  <button class="sm-btn" id="pauseBtn">Pause</button>
  <button class="sm-btn" id="clearBtn">Clear All</button>
</div>

<canvas id="c" width="1280" height="720"></canvas>

<div class="ctrl-row">
  <div class="ctrl"><label>Visualizer</label>
    <select id="vizType">
      <option value="circle" selected>Circle Spectrum</option>
      <option value="bars">Spectrum Bars</option>
      <option value="wave">Waveform</option>
      <option value="mirrorBars">Mirror Bars</option>
    </select>
  </div>
  <div class="ctrl"><label>Particles</label>
    <select id="partStyle">
      <option value="stars">Stars</option>
      <option value="bubbles">Bubbles</option>
      <option value="sparks">Sparks</option>
      <option value="snow">Snow</option>
      <option value="fireflies">Fireflies</option>
      <option value="matrix">Matrix Rain</option>
      <option value="confetti">Confetti</option>
      <option value="orbs">Orbs</option>
    </select>
  </div>
  <div class="ctrl"><label>Color Scheme</label>
    <select id="colorScheme">
      <option value="purple">Purple / Blue</option>
      <option value="fire">Fire</option>
      <option value="teal">Teal / Cyan</option>
      <option value="gold">Gold</option>
      <option value="pink">Pink / Magenta</option>
      <option value="neon">Neon Green</option>
      <option value="arctic">Arctic</option>
      <option value="sunset">Sunset</option>
      <option value="rainbow">Rainbow</option>
      <option disabled>── Album Covers ──</option>
      <option value="darkPhonk">Dark Phonk</option>
      <option value="driftToSleep">Drift To Sleep</option>
      <option value="fireplace">Fireplace</option>
      <option value="forestWalk">Forest Walk</option>
      <option value="lateNightStudy">Late Night Study</option>
      <option value="lonelyRain">Lonely Rain</option>
      <option value="morningCoffee">Morning Coffee</option>
      <option value="oceanBreeze">Ocean Breeze</option>
      <option value="rainyNight">Rainy Night</option>
      <option value="tokyoDaydream">Tokyo Daydream</option>
    </select>
  </div>
  <div class="ctrl"><label>Overlay Darkness</label>
    <select id="overlay">
      <option value="0.3" selected>Light</option>
      <option value="0.5">Medium</option>
      <option value="0.7">Dark</option>
    </select>
  </div>
</div>

<div id="status">Load an image and audio to begin</div>
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
<button class="dl-btn" id="dlBtn" disabled>Download Video</button>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = C.width, H = C.height;
let img = null, imgLoaded = false;
// Per-bar auto-gain tracking for even circle spectrum movement
const barMin = new Float32Array(100).fill(0.5);
const barMax = new Float32Array(100).fill(0.5);
let audioCtx, analyser, audioBuffer, gainNode, source;
let playing = false, animId;
let particles = [];

const palettes = {
  purple: ['#b44fff','#7c3aed','#818cf8','#c084fc','#6366f1'],
  fire:   ['#ff6b00','#ff3d00','#ffcc00','#ff9100','#ff4500'],
  teal:   ['#00e5ff','#00bcd4','#26c6da','#4dd0e1','#00acc1'],
  gold:   ['#ffd700','#ffb300','#ff8f00','#ffe082','#ffc107'],
  pink:   ['#ff4da6','#e91e8c','#ff80d5','#f50057','#ff69b4'],
  neon:   ['#00ff41','#39ff14','#00e676','#76ff03','#b9ff66'],
  arctic: ['#a0d8ef','#e0f7fa','#80deea','#b3e5fc','#81d4fa'],
  sunset: ['#ff7043','#ffa726','#ff5722','#ef5350','#ffca28'],
  rainbow:['#ff0080','#ff8c00','#ffe600','#00ff80','#00bfff'],
  darkPhonk:['#9b30ff','#ff00bf','#6a0dad','#c77dff','#3c1361'],
  driftToSleep:['#1b2a4a','#2c3e6b','#e8d5a3','#6b7fb5','#0f1b33'],
  fireplace:['#e8920d','#d45a00','#3e2210','#fff1d0','#ff7a1a'],
  forestWalk:['#1a5c2a','#4a7c3f','#6b8e4e','#a8c5a0','#2d5a27'],
  lateNightStudy:['#3b2816','#d4a34a','#f5e6c8','#8b6914','#1a0f05'],
  lonelyRain:['#3a5068','#2b3d52','#e07830','#5a7a96','#1e2d3d'],
  morningCoffee:['#8b6331','#d4a04a','#f5e0b8','#c08a3e','#5c3d1a'],
  oceanBreeze:['#f0966c','#e8b060','#f5c8a0','#d4845c','#f2a0a0'],
  rainyNight:['#c49090','#d4a8a0','#8a7070','#e8c0b0','#5c4a4a'],
  tokyoDaydream:['#ffb7c5','#70c0c8','#f09898','#c8a0d8','#ff8faa']
};

function pal(){ return palettes[document.getElementById('colorScheme').value]; }
function randCol(){ const p=pal(); return p[Math.floor(Math.random()*p.length)]; }

// ---- PARTICLES ----
// All particles use the same stars-style drift & lifecycle, just different shapes
const matChars = '01アイウエオカキクケコ';
function mkParticle(){
  const s = document.getElementById('partStyle').value;
  return {x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.5, vy:(Math.random()-.5)*.5,
    age:0, life:150+Math.random()*200, color:randCol(), style:s, r:1+Math.random()*3,
    rot:Math.random()*360, char:matChars[Math.floor(Math.random()*matChars.length)]};
}

function drawP(p, energy){
  const t = 1 - p.age/p.life;
  const boost = 1 + energy*2.5;
  const r = p.r*boost;
  ctx.save();
  ctx.globalAlpha = t * 0.8;
  ctx.fillStyle = p.color;
  ctx.strokeStyle = p.color;
  const s = p.style;

  if(s==='stars'){
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i*72-90)*Math.PI/180, b=(i*72-54)*Math.PI/180;
      i===0?ctx.moveTo(p.x+r*Math.cos(a),p.y+r*Math.sin(a)):ctx.lineTo(p.x+r*Math.cos(a),p.y+r*Math.sin(a));
      ctx.lineTo(p.x+r*.4*Math.cos(b),p.y+r*.4*Math.sin(b));
    }
    ctx.closePath();ctx.fill();
  } else if(s==='bubbles'){
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.lineWidth=1.5;ctx.stroke();
  } else if(s==='sparks'){
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*6,p.y-p.vy*6);ctx.lineWidth=r*.6;ctx.stroke();
  } else if(s==='snow'){
    // snowflake: 6 lines from center
    ctx.lineWidth=1;
    for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+Math.cos(a)*r*1.5,p.y+Math.sin(a)*r*1.5);ctx.stroke();}
  } else if(s==='fireflies'){
    ctx.globalAlpha=t*0.9*(Math.sin(p.age*.1)*.3+.7);
    ctx.beginPath();ctx.arc(p.x,p.y,r*.8,0,Math.PI*2);ctx.fill();
  } else if(s==='matrix'){
    ctx.font=(10+r*2)+'px monospace';ctx.fillText(p.char,p.x,p.y);
  } else if(s==='confetti'){
    ctx.translate(p.x,p.y);ctx.rotate((p.rot+p.age*2)*Math.PI/180);
    ctx.fillRect(-r*.6,-r*.25,r*1.2,r*.5);
  } else if(s==='orbs'){
    ctx.globalAlpha=t*0.2;
    ctx.beginPath();ctx.arc(p.x,p.y,r*3,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function updateP(p){p.age++;p.x+=p.vx;p.y+=p.vy;}

function manageParticles(energy){
  for(let i=0;i<2&&particles.length<100;i++) particles.push(mkParticle());
  particles=particles.filter(p=>p.age<p.life && p.x>-50&&p.x<W+50&&p.y>-50&&p.y<H+50);
  particles.forEach(p=>{updateP(p);drawP(p,energy);});
}

// ---- VISUALIZERS ----
function drawCircle(data,p,energy){
  const cx=W/2,cy=H/2,base=140+energy*30;
  // inner glow ring
  ctx.save();
  ctx.globalAlpha=0.15+energy*.3;
  ctx.strokeStyle=p[0];
  ctx.lineWidth=base*.8;
  ctx.beginPath();ctx.arc(cx,cy,base*.5,0,Math.PI*2);ctx.stroke();
  ctx.restore();
  // Power-curve mapped half-spectrum, mirrored for full 360°
  const halfBars=100;
  const len=data.length;
  const minBin=4, maxBin=Math.floor(len*0.7); // skip silent high bins
  const half=[];
  for(let i=0;i<halfBars;i++){
    const t=i/(halfBars-1);
    const bin=minBin+(maxBin-minBin)*Math.pow(t,1.5);
    const lo=Math.floor(bin), hi=Math.min(lo+1,maxBin);
    const frac=bin-lo;
    const raw=(data[lo]*(1-frac)+data[hi]*frac)/255;
    // Auto-gain: track each bar's own min/max range
    barMin[i]+=(raw-barMin[i])*0.01;
    barMax[i]+=(raw-barMax[i])*0.01;
    barMin[i]=Math.min(barMin[i],raw);
    barMax[i]=Math.max(barMax[i],raw);
    const range=Math.max(barMax[i]-barMin[i],0.1);
    half.push(Math.min((raw-barMin[i])/range,1));
  }
  // Mirror for full circle
  const vals=[...half,...half.slice().reverse()];
  const bars=vals.length;
  for(let i=0;i<bars;i++){
    const v=vals[i];
    const a=(i/bars)*Math.PI*2-Math.PI/2;
    const r1=base, r2=base+v*H*.1+4;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);
    ctx.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);
    ctx.strokeStyle=p[i%p.length];
    ctx.lineWidth=2.5;
    ctx.globalAlpha=0.7+v*.3;
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}
function drawBars(data,p){
  const n=80,bw=W/n*.75;
  for(let i=0;i<n;i++){
    const v=data[i]/255, bh=v*H*.5;
    const x=i*(W/n)+(W/n-bw)/2;
    ctx.fillStyle=p[i%p.length];
    ctx.globalAlpha=0.85;
    ctx.beginPath();ctx.roundRect(x,H*.75-bh,bw,bh,3);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawMirrorBars(data,p){
  const n=80,bw=W/n*.7;
  for(let i=0;i<n;i++){
    const v=data[i]/255, bh=v*H*.35;
    const x=i*(W/n)+(W/n-bw)/2;
    ctx.fillStyle=p[i%p.length];
    ctx.globalAlpha=0.8;
    ctx.beginPath();ctx.roundRect(x,H/2-bh,bw,bh,2);ctx.fill();
    ctx.beginPath();ctx.roundRect(x,H/2,bw,bh,2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawWave(data,p){
  ctx.beginPath();ctx.strokeStyle=p[0];ctx.lineWidth=3;ctx.globalAlpha=.9;
  for(let i=0;i<data.length;i++){
    const x=i/data.length*W, v=(data[i]/128-1)*H*.28;
    i===0?ctx.moveTo(x,H/2+v):ctx.lineTo(x,H/2+v);
  }
  ctx.stroke();ctx.globalAlpha=1;
}

// ---- MAIN DRAW ----
function drawFrame(data){
  const p=pal();
  const energy=data.slice(0,64).reduce((a,b)=>a+b,0)/64/255;
  const ov=parseFloat(document.getElementById('overlay').value);

  ctx.clearRect(0,0,W,H);
  if(imgLoaded && img){
    const sc=Math.max(W/img.naturalWidth, H/img.naturalHeight);
    const dw=img.naturalWidth*sc, dh=img.naturalHeight*sc;
    ctx.drawImage(img,(W-dw)/2,(H-dh)/2,dw,dh);
  } else {
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  }

  ctx.fillStyle=`rgba(0,0,0,${ov})`;ctx.fillRect(0,0,W,H);

  manageParticles(energy);

  const vt=document.getElementById('vizType').value;
  if(vt==='circle') drawCircle(data,p,energy);
  else if(vt==='bars') drawBars(data,p);
  else if(vt==='mirrorBars') drawMirrorBars(data,p);
  else drawWave(data,p);

}

// ---- ANIMATION LOOP ----
function loop(){
  animId=requestAnimationFrame(loop);
  const data=new Uint8Array(analyser?analyser.frequencyBinCount:256);
  if(analyser&&playing) analyser.getByteFrequencyData(data);
  drawFrame(data);
}

// ---- AUDIO SETUP ----
function initAudio(buf){
  if(audioCtx) audioCtx.close();
  audioCtx=new AudioContext();
  audioBuffer=buf;
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=512;
  gainNode=audioCtx.createGain();
  analyser.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  particles=[];
  if(animId) cancelAnimationFrame(animId);
  loop();
  playPreview();
}

function playPreview(){
  if(!audioBuffer||!audioCtx) return;
  if(source){try{source.stop();}catch(e){}}
  source=audioCtx.createBufferSource();
  source.buffer=audioBuffer;
  source.connect(analyser);
  source.start(0);
  playing=true;
  source.onended=()=>{playing=false;};
}

// ---- FILE INPUTS ----
document.getElementById('imgInput').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  img=new Image();
  img.onload=()=>{
    imgLoaded=true;
    document.getElementById('imgLabel').textContent='✓ '+f.name;
    document.getElementById('imgLabel').classList.add('loaded');
    setStatus('Image loaded!');
    if(!animId) loop();
  };
  img.onerror=()=>setStatus('Error loading image');
  img.src=URL.createObjectURL(f);
};

document.getElementById('audioInput').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  setStatus('Loading audio...');
  const reader=new FileReader();
  reader.onload=ev=>{
    const tmp=new AudioContext();
    tmp.decodeAudioData(ev.target.result.slice(0), buf=>{
      tmp.close();
      window.audioBuffer=buf;
      document.getElementById('audioLabel').textContent='✓ '+f.name;
      document.getElementById('audioLabel').classList.add('loaded');
      document.getElementById('dlBtn').disabled=false;
      setStatus('Audio loaded! Previewing — configure your look, then download.');
      initAudio(buf);
    }, ()=>setStatus('Error decoding audio'));
  };
  reader.readAsArrayBuffer(f);
};

// ---- PAUSE / CLEAR ----
document.getElementById('pauseBtn').onclick=function(){
  if(!audioCtx||!source)return;
  if(audioCtx.state==='running'){audioCtx.suspend();this.textContent='Resume';}
  else{audioCtx.resume();this.textContent='Pause';}
};
document.getElementById('clearBtn').onclick=function(){
  if(source){try{source.stop();}catch(e){}}
  playing=false;
  if(audioCtx){audioCtx.close();audioCtx=null;analyser=null;}
  img=null;imgLoaded=false;window.audioBuffer=null;particles=[];
  document.getElementById('imgLabel').textContent='+ Load Image';
  document.getElementById('imgLabel').classList.remove('loaded');
  document.getElementById('audioLabel').textContent='+ Load Audio';
  document.getElementById('audioLabel').classList.remove('loaded');
  document.getElementById('imgInput').value='';
  document.getElementById('audioInput').value='';
  document.getElementById('dlBtn').disabled=true;
  document.getElementById('pauseBtn').textContent='Pause';
  setStatus('Load an image and audio to begin');
};

// ---- EBML/WebM helpers ----
function u8(...a){return new Uint8Array(a)}
function cat(...arrs){const t=arrs.reduce((s,a)=>s+a.length,0);const r=new Uint8Array(t);let o=0;for(const a of arrs){r.set(a,o);o+=a.length;}return r;}
function vint(v){if(v<=0x7E)return u8(0x80|v);if(v<=0x3FFE)return u8(0x40|(v>>8),v&0xFF);if(v<=0x1FFFFE)return u8(0x20|(v>>16),(v>>8)&0xFF,v&0xFF);return u8(0x10|(v>>>24)&0xFF,(v>>16)&0xFF,(v>>8)&0xFF,v&0xFF);}
function eid(id){if(id<=0xFF)return u8(id);if(id<=0xFFFF)return u8(id>>8,id&0xFF);if(id<=0xFFFFFF)return u8(id>>16,(id>>8)&0xFF,id&0xFF);return u8((id>>24)&0xFF,(id>>16)&0xFF,(id>>8)&0xFF,id&0xFF);}
function el(id,d){return cat(eid(id),vint(d.length),d);}
function elU(id,v,w){if(!w){w=1;let t=v;while(t>=256){w++;t=Math.floor(t/256);}}const d=new Uint8Array(w);let t=v;for(let i=w-1;i>=0;i--){d[i]=t&0xFF;t=Math.floor(t/256);}return el(id,d);}
function elF(id,v){const b=new ArrayBuffer(8);new DataView(b).setFloat64(0,v);return el(id,new Uint8Array(b));}
function elS(id,s){return el(id,new TextEncoder().encode(s));}

function buildWebM(vChunks,aChunks,w,h,durMs,opusPriv){
  const header=el(0x1A45DFA3,cat(elU(0x4286,1),elU(0x42F7,1),elU(0x42F2,4),elU(0x42F3,8),elS(0x4282,'webm'),elU(0x4287,4),elU(0x4285,2)));
  const info=el(0x1549A966,cat(elU(0x2AD7B1,1000000),elS(0x4D80,'Mortek'),elS(0x5741,'Mortek'),elF(0x4489,durMs)));
  const vTrack=el(0xAE,cat(elU(0xD7,1),elU(0x73C5,1,4),elU(0x9C,0),elU(0x83,1),elS(0x86,'V_VP8'),el(0xE0,cat(elU(0xB0,w,2),elU(0xBA,h,2)))));
  const aTrack=el(0xAE,cat(elU(0xD7,2),elU(0x73C5,2,4),elU(0x9C,0),elU(0x83,2),elS(0x86,'A_OPUS'),elU(0x56AA,6500000,4),elU(0x56BB,80000000,4),el(0x63A2,opusPriv),el(0xE1,cat(elF(0xB5,48000),elU(0x9F,2)))));
  const tracks=el(0x1654AE6B,cat(vTrack,aTrack));
  // Build clusters (1s each)
  const all=[];
  for(const c of vChunks)all.push({trk:1,t:c.ts/1000,d:c.data,kf:c.kf});
  for(const c of aChunks)all.push({trk:2,t:c.ts/1000,d:c.data,kf:true});
  all.sort((a,b)=>a.t-b.t);
  const clusters=[];let cStart=0,cBlocks=[];
  for(const b of all){
    if(b.t>=cStart+1000&&cBlocks.length){clusters.push(mkCluster(cStart,cBlocks));cStart=Math.floor(b.t/1000)*1000;cBlocks=[];}
    cBlocks.push(b);
  }
  if(cBlocks.length)clusters.push(mkCluster(cStart,cBlocks));
  const segData=cat(info,tracks,...clusters);
  return cat(header,eid(0x18538067),u8(0x01,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF),segData);
}
function mkCluster(tc,blocks){
  const parts=blocks.map(b=>{
    const rel=Math.round(b.t-tc);
    const trkV=b.trk===1?u8(0x81):u8(0x82);
    const tB=u8((rel>>8)&0xFF,rel&0xFF);
    const fl=b.kf?u8(0x80):u8(0x00);
    return el(0xA3,cat(trkV,tB,fl,b.d));
  });
  return el(0x1F43B675,cat(elU(0xE7,Math.round(tc)),...parts));
}

// ---- DOWNLOAD VIDEO (fast offline encode) ----
document.getElementById('dlBtn').onclick=async function(){
  if(!window.audioBuffer)return;
  if(typeof VideoEncoder==='undefined'){setStatus('Fast encoding requires Chrome or Edge.');return;}
  const btn=this;
  btn.disabled=true;
  const pBar=document.getElementById('progressBar'),pFill=document.getElementById('progressFill');
  pBar.style.display='block';pFill.style.width='0%';
  if(source){try{source.stop();}catch(e){}}
  playing=false;
  try{
    const buf=window.audioBuffer,fps=30,dur=buf.duration,totalFrames=Math.ceil(dur*fps);
    // Step 1: Pre-analyze audio offline using ScriptProcessorNode
    setStatus('Analyzing audio...');btn.textContent='Analyzing...';
    const sr=48000;
    const offCtx=new OfflineAudioContext(2,Math.ceil(dur*sr),sr);
    const offAn=offCtx.createAnalyser();offAn.fftSize=512;
    const offSrc=offCtx.createBufferSource();offSrc.buffer=buf;
    offSrc.connect(offAn);
    const proc=offCtx.createScriptProcessor(1024,2,2);
    offAn.connect(proc);proc.connect(offCtx.destination);
    const frames=[];
    const samplesPerFrame=Math.round(sr/fps);
    let sampleCount=0,nextFrame=0;
    proc.onaudioprocess=()=>{
      sampleCount+=1024;
      while(sampleCount>=nextFrame&&frames.length<totalFrames){
        const d=new Uint8Array(offAn.frequencyBinCount);
        offAn.getByteFrequencyData(d);
        frames.push(d);
        nextFrame+=samplesPerFrame;
      }
    };
    offSrc.start(0);
    const rendered=await offCtx.startRendering();
    while(frames.length<totalFrames)frames.push(new Uint8Array(offAn.frequencyBinCount));
    pFill.style.width='10%';

    // Step 2: Encode video
    setStatus('Encoding video...');
    const vOut=[];
    const vEnc=new VideoEncoder({output:(chunk,meta)=>{const d=new Uint8Array(chunk.byteLength);chunk.copyTo(d);vOut.push({data:d,ts:chunk.timestamp,kf:chunk.type==='key'});},error:e=>{throw e;}});
    vEnc.configure({codec:'vp8',width:W,height:H,bitrate:8000000,framerate:fps});
    for(let i=0;i<totalFrames;i++){
      drawFrame(frames[i]);
      const vf=new VideoFrame(C,{timestamp:Math.round(i*1000000/fps)});
      vEnc.encode(vf,{keyFrame:i%150===0});vf.close();
      if(vEnc.encodeQueueSize>10)await new Promise(r=>setTimeout(r,1));
      if(i%30===0){pFill.style.width=(10+i/totalFrames*55)+'%';btn.textContent='Encoding video... '+Math.round(i/totalFrames*100)+'%';await new Promise(r=>setTimeout(r,0));}
    }
    await vEnc.flush();vEnc.close();
    pFill.style.width='70%';

    // Step 3: Encode audio
    setStatus('Encoding audio...');btn.textContent='Encoding audio...';
    let opusPriv=null;const aOut=[];
    const aEnc=new AudioEncoder({output:(chunk,meta)=>{if(meta?.decoderConfig?.description)opusPriv=new Uint8Array(meta.decoderConfig.description);const d=new Uint8Array(chunk.byteLength);chunk.copyTo(d);aOut.push({data:d,ts:chunk.timestamp});},error:e=>{throw e;}});
    aEnc.configure({codec:'opus',sampleRate:48000,numberOfChannels:2,bitrate:128000});
    const nCh=rendered.numberOfChannels,nF=rendered.length,ch0=rendered.getChannelData(0),ch1=nCh>1?rendered.getChannelData(1):ch0;
    for(let o=0;o<nF;o+=960){
      const n=Math.min(960,nF-o),d=new Float32Array(2*n);
      d.set(ch0.subarray(o,o+n),0);d.set(ch1.subarray(o,o+n),n);
      const ad=new AudioData({format:'f32-planar',sampleRate:48000,numberOfFrames:n,numberOfChannels:2,timestamp:Math.round(o/48000*1000000),data:d.buffer});
      aEnc.encode(ad);ad.close();
    }
    await aEnc.flush();aEnc.close();
    pFill.style.width='85%';

    // Default OpusHead if encoder didn't provide one
    if(!opusPriv){opusPriv=new Uint8Array(19);opusPriv.set(new TextEncoder().encode('OpusHead'));const dv=new DataView(opusPriv.buffer);dv.setUint8(8,1);dv.setUint8(9,2);dv.setUint16(10,3840,true);dv.setUint32(12,48000,true);}

    // Step 4: Mux & download
    setStatus('Building file...');btn.textContent='Building file...';
    const webm=buildWebM(vOut,aOut,W,H,dur*1000,opusPriv);
    pFill.style.width='100%';
    const blob=new Blob([webm],{type:'video/webm'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mortek-music-video.webm';a.click();
    URL.revokeObjectURL(a.href);
    setStatus('Done! Video saved.');
    // Restart preview
    initAudio(buf);
  }catch(err){setStatus('Error: '+err.message);console.error(err);}
  finally{btn.disabled=false;btn.textContent='Download Video';pBar.style.display='none';}
};

function setStatus(t){document.getElementById('status').textContent=t;}
loop();
</script>
</body>
</html>
