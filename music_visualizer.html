<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Mortek Music Visualizer — Create music videos with custom visuals, particles, and color schemes.">
<meta name="theme-color" content="#0d0d18">
<title>Music Visualizer — Mortek</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d18;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;padding:24px 20px;gap:0}
h1{font-size:15px;font-weight:600;color:#c4a0ff;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
canvas{display:block;border-radius:12px;max-width:100%;height:auto;box-shadow:0 4px 40px rgba(108,63,197,0.15)}
.panel{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;margin-bottom:20px}
.upload-btn{display:inline-flex;align-items:center;gap:6px;background:#1e1e3a;border:1.5px dashed #444;color:#aaa;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s}
.upload-btn:hover{border-color:#a07fff;background:#2a2a4a;color:#ccc}
.upload-btn.loaded{border-color:#5cb85c;border-style:solid;color:#7ddb7d}
.upload-wrap{display:inline-flex;align-items:center;gap:0}
.clear-x{display:none;background:none;border:none;color:#ff5555;font-size:16px;cursor:pointer;padding:2px 6px;line-height:1;opacity:0.6;transition:opacity .2s}
.clear-x:hover{opacity:1}
.upload-wrap.has-file .clear-x{display:inline-flex}
.cat-label{width:100%;text-align:center;font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1.5px;padding:2px 0 0}
.icon-btn{background:#1e1e3a;border:1px solid #333;color:#999;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:16px;line-height:1;transition:all .2s}
.icon-btn:hover{border-color:#a07fff;background:#2a2a4a;color:#ccc}
input[type=file]{display:none}
.ctrl{display:flex;flex-direction:column;gap:3px;align-items:center}
.ctrl label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:0.5px}
select{background:#1a1a30;border:1px solid #333;color:#ccc;border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;transition:border-color .2s}
select:hover{border-color:#a07fff}
.ctrl-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:8px 14px;background:#111128;border-radius:10px;border:1px solid #1e1e3a;margin-top:12px}
.dl-btn{background:linear-gradient(135deg,#6c3fc5,#4a90d9);border:none;color:#fff;padding:12px 36px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;letter-spacing:.5px;transition:all .2s;margin-top:6px}
.dl-btn:hover{opacity:.85;transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,63,197,0.3)}
.dl-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
#status{font-size:11px;color:#666;min-height:16px;margin-top:10px}
.progress-bar{width:300px;height:5px;background:#1e1e3a;border-radius:3px;overflow:hidden;display:none;margin-top:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,#6c3fc5,#4a90d9);width:0%;transition:width .3s}
.sm-btn{background:#1e1e3a;border:1px solid #333;color:#999;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s}
.sm-btn:hover{border-color:#a07fff;background:#2a2a4a;color:#ccc}
.seek-row{display:flex;align-items:center;gap:10px;width:100%;max-width:960px;margin:10px 0 2px}
.seek-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:#1e1e3a;border-radius:2px;outline:none;cursor:pointer}
.seek-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#a07fff;cursor:pointer;box-shadow:0 0 6px rgba(160,127,255,0.4)}
.seek-row input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#a07fff;border:none;cursor:pointer}
.seek-row input[type=range]::-moz-range-track{background:#1e1e3a;height:4px;border-radius:2px}
.seek-time{font-size:11px;color:#666;min-width:80px;text-align:center;font-variant-numeric:tabular-nums}
.download-row{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:8px}
.version{position:fixed;bottom:8px;right:12px;font-size:11px;color:#555;pointer-events:none}
#loginOverlay{position:fixed;inset:0;background:#0d0d18;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999}
#loginOverlay h2{font-size:16px;color:#c4a0ff;letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}
#loginOverlay input{background:#1a1a30;border:1px solid #333;color:#fff;border-radius:8px;padding:10px 16px;font-size:14px;width:240px;outline:none;transition:border-color .2s}
#loginOverlay input:focus{border-color:#a07fff}
#loginOverlay button{background:linear-gradient(135deg,#6c3fc5,#4a90d9);border:none;color:#fff;padding:11px 36px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;width:240px}
#loginOverlay button:hover{opacity:.85;transform:translateY(-1px)}
#loginOverlay .login-err{font-size:12px;color:#ff4444;min-height:16px}
#appContent.hidden{display:none}
</style>
</head>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = C.width, H = C.height;
let img = null, imgLoaded = false, imgName = '';
let logo = null, logoLoaded = false;
let logoMaskSrc = null; // pre-processed: bright parts as white with luminosity-alpha
const logoCanvas = document.createElement('canvas');
let playStartTime=0, playOffset=0; // for seek tracking
// Per-bar auto-gain tracking for even circle spectrum movement
const barMin = new Float32Array(200).fill(0.5);
const barMax = new Float32Array(200).fill(0.5);
let audioCtx, analyser, audioBuffer, gainNode, source;
let playing = false, animId;
let particles = [];
let prevBass = 0; // previous frame bass for onset detection
let bgZoom = 0; // current bass zoom amount (eases back to 0)
let bgBright = 0; // current brightness pulse (eases back to 0)
let bgVig = 0; // current vignette pulse (eases back to 0)
let bgHue = 0; // cumulative hue rotation in degrees
let frameCount = 0;

// ---- PREFERENCES (session cookie) ----
const prefIds=['partStyle','partIntensity','partAmount','partSpeed','partSize','partLife','bassReact','colorScheme','overlay','centerShadow','barIntensity','barThreshold','barCount','barWidth','barSmoothing','barLength','innerRadius','bassZoom','brightPulse','vigPulse','hueShift'];
const prefRangeIds=['logoTint','hueSat'];
function savePrefs(){
  const prefs={};
  prefIds.forEach(id=>{prefs[id]=document.getElementById(id).value;});
  prefRangeIds.forEach(id=>{prefs[id]=document.getElementById(id).value;});
  document.cookie='mvPrefs='+encodeURIComponent(JSON.stringify(prefs))+';path=/;SameSite=Lax';
}
function loadPrefs(){
  const m=document.cookie.match(/(?:^|;\s*)mvPrefs=([^;]*)/);
  if(!m) return;
  try{
    const prefs=JSON.parse(decodeURIComponent(m[1]));
    prefIds.forEach(id=>{
      const el=document.getElementById(id);
      if(prefs[id]&&el.querySelector('option[value="'+prefs[id]+'"]')) el.value=prefs[id];
    });
    prefRangeIds.forEach(id=>{
      if(prefs[id]!=null) document.getElementById(id).value=prefs[id];
    });
  }catch(e){}
}
loadPrefs();
// Update slider label
const logoTintEl=document.getElementById('logoTint'),logoTintVal=document.getElementById('logoTintVal');
logoTintVal.textContent=logoTintEl.value+'%';
logoTintEl.oninput=function(){logoTintVal.textContent=this.value+'%';};
const hueSatEl=document.getElementById('hueSat'),hueSatVal=document.getElementById('hueSatVal');
hueSatVal.textContent=hueSatEl.value+'%';
hueSatEl.oninput=function(){hueSatVal.textContent=this.value+'%';};
document.getElementById('savePrefBtn').onclick=function(){
  savePrefs();
  this.textContent='Saved!';
  setTimeout(()=>{this.textContent='Save Preferences';},1500);
};

const palettes = {
  imageColors: ['#b44fff','#7c3aed','#818cf8','#c084fc','#6366f1'], // default until image loaded
  purple: ['#b44fff','#7c3aed','#818cf8','#c084fc','#6366f1'],
  fire:   ['#ff6b00','#ff3d00','#ffcc00','#ff9100','#ff4500'],
  teal:   ['#00e5ff','#00bcd4','#26c6da','#4dd0e1','#00acc1'],
  gold:   ['#ffd700','#ffb300','#ff8f00','#ffe082','#ffc107'],
  pink:   ['#ff4da6','#e91e8c','#ff80d5','#f50057','#ff69b4'],
  neon:   ['#00ff41','#39ff14','#00e676','#76ff03','#b9ff66'],
  arctic: ['#a0d8ef','#e0f7fa','#80deea','#b3e5fc','#81d4fa'],
  sunset: ['#ff7043','#ffa726','#ff5722','#ef5350','#ffca28'],
  rainbow:['#ff0080','#ff8c00','#ffe600','#00ff80','#00bfff']
};

function pal(){ return palettes[document.getElementById('colorScheme').value]||palettes.purple; }
function randCol(){ const p=pal(); return p[Math.floor(Math.random()*p.length)]; }

// ---- EXTRACT COLORS FROM IMAGE ----
function extractColors(image,count){
  const sz=64;
  const tc=document.createElement('canvas');tc.width=sz;tc.height=sz;
  const tx=tc.getContext('2d');
  tx.drawImage(image,0,0,sz,sz);
  const d=tx.getImageData(0,0,sz,sz).data;
  // Collect pixels, skip very dark and very bright
  const pixels=[];
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    const lum=r*0.299+g*0.587+b*0.114;
    if(lum>30&&lum<235) pixels.push([r,g,b]);
  }
  if(pixels.length<10) return null;
  // Simple k-means clustering
  let centers=[];
  for(let i=0;i<count;i++) centers.push(pixels[Math.floor(Math.random()*pixels.length)].slice());
  for(let iter=0;iter<20;iter++){
    const clusters=Array.from({length:count},()=>[]);
    for(const p of pixels){
      let best=0,bestD=Infinity;
      for(let c=0;c<count;c++){
        const dr=p[0]-centers[c][0],dg=p[1]-centers[c][1],db=p[2]-centers[c][2];
        const dist=dr*dr+dg*dg+db*db;
        if(dist<bestD){bestD=dist;best=c;}
      }
      clusters[best].push(p);
    }
    for(let c=0;c<count;c++){
      if(!clusters[c].length) continue;
      centers[c]=[0,1,2].map(ch=>Math.round(clusters[c].reduce((s,p)=>s+p[ch],0)/clusters[c].length));
    }
  }
  // Sort by saturation (most colorful first)
  centers.sort((a,b)=>{
    const satA=Math.max(...a)-Math.min(...a),satB=Math.max(...b)-Math.min(...b);
    return satB-satA;
  });
  return centers.map(c=>'#'+c.map(v=>v.toString(16).padStart(2,'0')).join(''));
}

function applyImageColors(image){
  const colors=extractColors(image,5);
  if(!colors) return;
  palettes.imageColors=colors;
  const sel=document.getElementById('colorScheme');
  // Remove old image colors option if exists
  const old=sel.querySelector('option[value="imageColors"]');
  if(old) old.remove();
  const oldSep=sel.querySelector('.img-color-sep');
  if(oldSep) oldSep.remove();
  // Add at top
  const sep=document.createElement('option');sep.disabled=true;sep.textContent='── Uploaded Image ──';sep.className='img-color-sep';
  const opt=document.createElement('option');opt.value='imageColors';opt.textContent='Image Colors';
  sel.insertBefore(opt,sel.firstChild);
  sel.insertBefore(sep,sel.firstChild);
  sel.value='imageColors';
}

// ---- LOGO MASK: extract bright parts as luminosity-alpha silhouette ----
function processLogoMask(){
  const tc=document.createElement('canvas');
  tc.width=logo.naturalWidth; tc.height=logo.naturalHeight;
  const tx=tc.getContext('2d');
  tx.drawImage(logo,0,0);
  const id=tx.getImageData(0,0,tc.width,tc.height), d=id.data;
  for(let i=0;i<d.length;i+=4){
    const lum=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
    const a=d[i+3]/255;
    // Dark pixels become transparent, bright pixels become opaque white
    const t=lum<20?0:Math.min(Math.pow((lum-20)/160,0.7),1);
    d[i]=d[i+1]=d[i+2]=255;
    d[i+3]=Math.round(a*t*255);
  }
  tx.putImageData(id,0,0);
  logoMaskSrc=tc;
}

// ---- PARTICLES ----
// All particles use the same stars-style drift & lifecycle, just different shapes
const matChars = '01アイウエオカキクケコ';
function mkParticle(){
  const s = document.getElementById('partStyle').value;
  const spd=parseFloat(document.getElementById('partSpeed').value);
  const sz=parseFloat(document.getElementById('partSize').value);
  const lf=parseFloat(document.getElementById('partLife').value);
  const x=Math.random()*W, y=Math.random()*H;
  return {x, y, hx:x, hy:y, vx:(Math.random()-.5)*spd, vy:(Math.random()-.5)*spd,
    ox:0, oy:0, // bass displacement offset
    age:0, life:(150+Math.random()*200)*lf, color:randCol(), style:s, r:(1+Math.random()*3)*sz,
    rot:Math.random()*360, char:matChars[Math.floor(Math.random()*matChars.length)]};
}

function drawP(p, energy){
  const t = 1 - p.age/p.life;
  const pInt=parseFloat(document.getElementById('partIntensity').value);
  const boost = 1 + energy*2.5*pInt;
  const r = p.r*boost;
  ctx.save();
  ctx.globalAlpha = t * 0.8;
  ctx.fillStyle = p.color;
  ctx.strokeStyle = p.color;
  const s = p.style;

  if(s==='stars'){
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i*72-90)*Math.PI/180, b=(i*72-54)*Math.PI/180;
      i===0?ctx.moveTo(p.x+r*Math.cos(a),p.y+r*Math.sin(a)):ctx.lineTo(p.x+r*Math.cos(a),p.y+r*Math.sin(a));
      ctx.lineTo(p.x+r*.4*Math.cos(b),p.y+r*.4*Math.sin(b));
    }
    ctx.closePath();ctx.fill();
  } else if(s==='bubbles'){
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.lineWidth=1.5;ctx.stroke();
  } else if(s==='sparks'||s==='sparksint'){
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*6,p.y-p.vy*6);ctx.lineWidth=r*.6;ctx.stroke();
  } else if(s==='snow'){
    // snowflake: 6 lines from center
    ctx.lineWidth=1;
    for(let i=0;i<6;i++){const a=i*Math.PI/3;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+Math.cos(a)*r*1.5,p.y+Math.sin(a)*r*1.5);ctx.stroke();}
  } else if(s==='fireflies'){
    ctx.globalAlpha=t*0.9*(Math.sin(p.age*.1)*.3+.7);
    ctx.beginPath();ctx.arc(p.x,p.y,r*.8,0,Math.PI*2);ctx.fill();
  } else if(s==='matrix'){
    ctx.font=(10+r*2)+'px monospace';ctx.fillText(p.char,p.x,p.y);
  } else if(s==='confetti'){
    ctx.translate(p.x,p.y);ctx.rotate((p.rot+p.age*2)*Math.PI/180);
    ctx.fillRect(-r*.6,-r*.25,r*1.2,r*.5);
  } else if(s==='orbs'){
    ctx.globalAlpha=t*0.2;
    ctx.beginPath();ctx.arc(p.x,p.y,r*3,0,Math.PI*2);ctx.fill();
  } else if(s==='diamonds'){
    ctx.translate(p.x,p.y);ctx.rotate(Math.PI/4);
    ctx.fillRect(-r*.5,-r*.5,r,r);
  } else if(s==='rings'){
    ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(p.x,p.y,r*1.2,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(p.x,p.y,r*.5,0,Math.PI*2);ctx.stroke();
  } else if(s==='crosses'){
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(p.x-r,p.y);ctx.lineTo(p.x+r,p.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x,p.y-r);ctx.lineTo(p.x,p.y+r);ctx.stroke();
  } else if(s==='hearts'){
    const hr=r*.6;
    ctx.beginPath();ctx.moveTo(p.x,p.y+hr);
    ctx.bezierCurveTo(p.x-hr*2,p.y-hr,p.x,p.y-hr*2,p.x,p.y-hr*.5);
    ctx.bezierCurveTo(p.x,p.y-hr*2,p.x+hr*2,p.y-hr,p.x,p.y+hr);
    ctx.fill();
  } else if(s==='arrows'){
    ctx.lineWidth=1.5;
    const ax=p.vx||0.3,ay=p.vy||0.3;
    const len=Math.sqrt(ax*ax+ay*ay)||1;
    const nx=ax/len,ny=ay/len;
    ctx.beginPath();ctx.moveTo(p.x-nx*r*2,p.y-ny*r*2);ctx.lineTo(p.x+nx*r*2,p.y+ny*r*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x+nx*r*2,p.y+ny*r*2);
    ctx.lineTo(p.x+nx*r-ny*r,p.y+ny*r+nx*r);ctx.moveTo(p.x+nx*r*2,p.y+ny*r*2);
    ctx.lineTo(p.x+nx*r+ny*r,p.y+ny*r-nx*r);ctx.stroke();
  } else if(s==='dots'){
    ctx.beginPath();ctx.arc(p.x,p.y,r*.5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function updateP(p){
  p.age++;
  // Move home position by velocity
  p.hx+=p.vx; p.hy+=p.vy;
  // Ease offset back to zero (slow return)
  p.ox*=0.92; p.oy*=0.92;
  // Actual position = home + bass offset
  p.x=p.hx+p.ox; p.y=p.hy+p.oy;
}

function manageParticles(energy,data){
  const maxP=parseInt(document.getElementById('partAmount').value);
  const spawnR=Math.max(1,Math.round(maxP/40));
  for(let i=0;i<spawnR&&particles.length<maxP;i++) particles.push(mkParticle());
  particles=particles.filter(p=>p.age<p.life && p.x>-50&&p.x<W+50&&p.y>-50&&p.y<H+50);
  // Bass onset detection: first 8 bins (~0-340 Hz)
  const bassStr=parseFloat(document.getElementById('bassReact').value);
  if(bassStr>0){
    const bass=data.slice(0,8).reduce((a,b)=>a+b,0)/8/255;
    const onset=Math.max(bass-prevBass,0);
    prevBass+=(bass-prevBass)*0.3;
    if(onset>0.05){
      const cx=W/2, cy=H/2, strength=onset*bassStr;
      particles.forEach(p=>{
        let dx=p.hx-cx, dy=p.hy-cy;
        const dist=Math.sqrt(dx*dx+dy*dy)||1;
        p.ox+=dx/dist*strength;
        p.oy+=dy/dist*strength;
      });
    }
  }
  particles.forEach(p=>{updateP(p);drawP(p,energy);});
}

// ---- VISUALIZERS ----
function drawCircle(data,p,energy){
  const baseR=parseFloat(document.getElementById('innerRadius').value);
  const cx=W/2,cy=H/2,base=baseR*0.9+8+energy*6;
  // inner circle: logo or glow ring
  if(logoLoaded&&logoMaskSrc){
    ctx.save();
    ctx.beginPath();ctx.arc(cx,cy,base*.9,0,Math.PI*2);ctx.clip();
    const lSize=baseR*1.8;
    const lRatio=logo.naturalWidth/logo.naturalHeight;
    let lw,lh;
    if(lRatio>=1){lw=lSize;lh=lSize/lRatio;}else{lh=lSize;lw=lSize*lRatio;}
    // Tint luminosity mask: blend palette color ↔ white via slider
    const tint=parseInt(document.getElementById('logoTint').value)/100;
    const pc=p[0];
    const pr=parseInt(pc.slice(1,3),16),pg=parseInt(pc.slice(3,5),16),pb=parseInt(pc.slice(5,7),16);
    const mr=Math.round(pr*tint+255*(1-tint)),mg=Math.round(pg*tint+255*(1-tint)),mb=Math.round(pb*tint+255*(1-tint));
    const logoCol='rgb('+mr+','+mg+','+mb+')';
    const lc=logoCanvas, lx=lc.getContext('2d');
    lc.width=Math.ceil(lw); lc.height=Math.ceil(lh);
    lx.drawImage(logoMaskSrc,0,0,lc.width,lc.height);
    lx.globalCompositeOperation='source-in';
    lx.fillStyle=logoCol;
    lx.fillRect(0,0,lc.width,lc.height);
    // Glow layer
    ctx.globalAlpha=0.2+energy*0.25;
    ctx.shadowColor=logoCol;
    ctx.shadowBlur=25+energy*30;
    ctx.drawImage(lc,cx-lw/2,cy-lh/2,lw,lh);
    // Sharp logo on top
    ctx.shadowBlur=0;
    ctx.globalAlpha=0.95+energy*0.05;
    ctx.drawImage(lc,cx-lw/2,cy-lh/2,lw,lh);
    ctx.restore();
  } else {
    ctx.save();
    ctx.globalAlpha=0.15+energy*.3;
    ctx.strokeStyle=p[0];
    ctx.lineWidth=base*.8;
    ctx.beginPath();ctx.arc(cx,cy,base*.5,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  // Power-curve mapped half-spectrum, mirrored for full 360°
  const halfBars=parseInt(document.getElementById('barCount').value);
  const bSmooth=parseFloat(document.getElementById('barSmoothing').value);
  const bThresh=parseFloat(document.getElementById('barThreshold').value);
  const bInt=parseFloat(document.getElementById('barIntensity').value);
  const bWidth=parseFloat(document.getElementById('barWidth').value);
  const len=data.length;
  const minBin=4, maxBin=Math.floor(len*0.7); // skip silent high bins
  const half=[];
  for(let i=0;i<halfBars;i++){
    const t=i/(halfBars-1);
    const bin=minBin+(maxBin-minBin)*Math.pow(t,1.5);
    const lo=Math.floor(bin), hi=Math.min(lo+1,maxBin);
    const frac=bin-lo;
    const raw=(data[lo]*(1-frac)+data[hi]*frac)/255;
    // Auto-gain: track each bar's own min/max range
    barMin[i]+=(raw-barMin[i])*bSmooth;
    barMax[i]+=(raw-barMax[i])*bSmooth;
    barMin[i]=Math.min(barMin[i],raw);
    barMax[i]=Math.max(barMax[i],raw);
    const range=Math.max(barMax[i]-barMin[i],0.1);
    let v=Math.min((raw-barMin[i])/range,1);
    if(v<bThresh) v=0;
    half.push(v);
  }
  // Mirror for full circle
  const vals=[...half,...half.slice().reverse()];
  const bars=vals.length;
  for(let i=0;i<bars;i++){
    const v=vals[i];
    const a=(i/bars)*Math.PI*2-Math.PI/2;
    const bLen=parseFloat(document.getElementById('barLength').value);
    const r1=base, r2=base+v*H*bLen*bInt+4;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);
    ctx.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);
    ctx.strokeStyle=p[i%p.length];
    ctx.lineWidth=bWidth;
    ctx.globalAlpha=0.7+v*.3;
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}
// ---- MAIN DRAW ----
function drawFrame(data){
  frameCount++;
  const p=pal();
  const energy=data.slice(0,64).reduce((a,b)=>a+b,0)/64/255;
  const ov=parseFloat(document.getElementById('overlay').value);

  // Bass onset detection for background FX (reuse prevBass from particles)
  const bassFX=data.slice(0,8).reduce((a,b)=>a+b,0)/8/255;
  const bassOnset=Math.max(bassFX-prevBass,0);
  const zoomStr=parseFloat(document.getElementById('bassZoom').value);
  const brightStr=parseFloat(document.getElementById('brightPulse').value);
  const vigStr=parseFloat(document.getElementById('vigPulse').value);
  const hueStr=parseFloat(document.getElementById('hueShift').value);

  // Only trigger on actual bass onset
  if(bassOnset>0.05){
    bgZoom=Math.max(bgZoom,bassOnset*zoomStr*8);
    bgBright=Math.max(bgBright,bassOnset*brightStr*4);
    bgVig=Math.max(bgVig,bassOnset*vigStr*4);
  }
  // Ease back
  bgZoom*=0.88; bgBright*=0.85; bgVig*=0.9;
  // Hue accumulates
  bgHue+=hueStr;

  ctx.clearRect(0,0,W,H);
  if(imgLoaded && img){
    ctx.save();
    // Bass zoom: scale from center
    if(bgZoom>0.0005){
      const z=1+bgZoom;
      ctx.translate(W/2,H/2);ctx.scale(z,z);ctx.translate(-W/2,-H/2);
    }
    // Hue shift via filter
    if(hueStr>0){
      const hueSat=parseInt(document.getElementById('hueSat').value)/100;
      ctx.filter='hue-rotate('+bgHue+'deg) saturate('+hueSat+')';
    }
    const sc=Math.max(W/img.naturalWidth, H/img.naturalHeight);
    const dw=img.naturalWidth*sc, dh=img.naturalHeight*sc;
    ctx.drawImage(img,(W-dw)/2,(H-dh)/2,dw,dh);
    ctx.filter='none';
    ctx.restore();
  } else {
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  }

  // Overlay
  if(ov>0){ctx.fillStyle=`rgba(0,0,0,${ov})`;ctx.fillRect(0,0,W,H);}

  // Brightness pulse: flash lighter on beats
  if(bgBright>0.005){
    ctx.fillStyle=`rgba(255,255,255,${bgBright})`;
    ctx.fillRect(0,0,W,H);
  }

  manageParticles(energy,data);

  // Center shadow + vignette pulse
  const cs=parseFloat(document.getElementById('centerShadow').value);
  const vigTotal=Math.min(cs+bgVig,1);
  if(vigTotal>0){
    const vigRadius=280-bgVig*80;
    const gr=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,vigRadius);
    gr.addColorStop(0,`rgba(0,0,0,${vigTotal})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
  }

  drawCircle(data,p,energy);

}

// ---- ANIMATION LOOP ----
const seekBar=document.getElementById('seekBar');
const seekTime=document.getElementById('seekTime');
let seeking=false;
function loop(){
  animId=requestAnimationFrame(loop);
  const data=new Uint8Array(analyser?analyser.frequencyBinCount:256);
  if(analyser&&playing) analyser.getByteFrequencyData(data);
  drawFrame(data);
  // Update seek bar
  if(audioBuffer&&!seeking){
    const total=audioBuffer.duration;
    const cur=Math.min(getCurrentTime(),total);
    seekBar.value=Math.round(cur/total*1000);
    seekTime.textContent=fmtTime(cur)+' / '+fmtTime(total);
    if(!playing&&cur>=total) seekBar.value=1000;
  }
}

// ---- AUDIO SETUP ----
function initAudio(buf){
  if(audioCtx) audioCtx.close();
  audioCtx=new AudioContext();
  audioBuffer=buf;
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=512;
  gainNode=audioCtx.createGain();
  analyser.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  particles=[];
  if(animId) cancelAnimationFrame(animId);
  loop();
  playPreview();
}

function playPreview(offset){
  if(!audioBuffer||!audioCtx) return;
  if(source){source.onended=null;try{source.stop();}catch(e){}}
  offset=offset||0;
  playOffset=offset;
  playStartTime=audioCtx.currentTime;
  source=audioCtx.createBufferSource();
  source.buffer=audioBuffer;
  source.connect(analyser);
  source.start(0,offset);
  playing=true;
  source.onended=()=>{playing=false;};
}

function getCurrentTime(){
  if(!audioCtx||!playing) return playOffset;
  return playOffset+(audioCtx.currentTime-playStartTime);
}

function fmtTime(s){
  const m=Math.floor(s/60),sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

// ---- EBML/WebM helpers ----
function u8(...a){return new Uint8Array(a)}
function cat(...arrs){const t=arrs.reduce((s,a)=>s+a.length,0);const r=new Uint8Array(t);let o=0;for(const a of arrs){r.set(a,o);o+=a.length;}return r;}
function vint(v){if(v<=0x7E)return u8(0x80|v);if(v<=0x3FFE)return u8(0x40|(v>>8),v&0xFF);if(v<=0x1FFFFE)return u8(0x20|(v>>16),(v>>8)&0xFF,v&0xFF);return u8(0x10|(v>>>24)&0xFF,(v>>16)&0xFF,(v>>8)&0xFF,v&0xFF);}
function eid(id){if(id<=0xFF)return u8(id);if(id<=0xFFFF)return u8(id>>8,id&0xFF);if(id<=0xFFFFFF)return u8(id>>16,(id>>8)&0xFF,id&0xFF);return u8((id>>24)&0xFF,(id>>16)&0xFF,(id>>8)&0xFF,id&0xFF);}
function el(id,d){return cat(eid(id),vint(d.length),d);}
function elU(id,v,w){if(!w){w=1;let t=v;while(t>=256){w++;t=Math.floor(t/256);}}const d=new Uint8Array(w);let t=v;for(let i=w-1;i>=0;i--){d[i]=t&0xFF;t=Math.floor(t/256);}return el(id,d);}
function elF(id,v){const b=new ArrayBuffer(8);new DataView(b).setFloat64(0,v);return el(id,new Uint8Array(b));}
function elS(id,s){return el(id,new TextEncoder().encode(s));}

function buildWebM(vChunks,aChunks,w,h,durMs,opusPriv){
  const header=el(0x1A45DFA3,cat(elU(0x4286,1),elU(0x42F7,1),elU(0x42F2,4),elU(0x42F3,8),elS(0x4282,'webm'),elU(0x4287,4),elU(0x4285,2)));
  const info=el(0x1549A966,cat(elU(0x2AD7B1,1000000),elS(0x4D80,'Mortek'),elS(0x5741,'Mortek'),elF(0x4489,durMs)));
  const vTrack=el(0xAE,cat(elU(0xD7,1),elU(0x73C5,1,4),elU(0x9C,0),elU(0x83,1),elS(0x86,'V_VP8'),el(0xE0,cat(elU(0xB0,w,2),elU(0xBA,h,2)))));
  const aTrack=el(0xAE,cat(elU(0xD7,2),elU(0x73C5,2,4),elU(0x9C,0),elU(0x83,2),elS(0x86,'A_OPUS'),elU(0x56AA,6500000,4),elU(0x56BB,80000000,4),el(0x63A2,opusPriv),el(0xE1,cat(elF(0xB5,48000),elU(0x9F,2)))));
  const tracks=el(0x1654AE6B,cat(vTrack,aTrack));
  // Build clusters (1s each)
  const all=[];
  for(const c of vChunks)all.push({trk:1,t:c.ts/1000,d:c.data,kf:c.kf});
  for(const c of aChunks)all.push({trk:2,t:c.ts/1000,d:c.data,kf:true});
  all.sort((a,b)=>a.t-b.t);
  const clusters=[];let cStart=0,cBlocks=[];
  for(const b of all){
    if(b.t>=cStart+1000&&cBlocks.length){clusters.push(mkCluster(cStart,cBlocks));cStart=Math.floor(b.t/1000)*1000;cBlocks=[];}
    cBlocks.push(b);
  }
  if(cBlocks.length)clusters.push(mkCluster(cStart,cBlocks));
  const segData=cat(info,tracks,...clusters);
  return cat(header,eid(0x18538067),u8(0x01,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF,0xFF),segData);
}
function mkCluster(tc,blocks){
  const parts=blocks.map(b=>{
    const rel=Math.round(b.t-tc);
    const trkV=b.trk===1?u8(0x81):u8(0x82);
    const tB=u8((rel>>8)&0xFF,rel&0xFF);
    const fl=b.kf?u8(0x80):u8(0x00);
    return el(0xA3,cat(trkV,tB,fl,b.d));
  });
  return el(0x1F43B675,cat(elU(0xE7,Math.round(tc)),...parts));
}

// ---- DOWNLOAD VIDEO (fast offline encode) ----
document.getElementById('dlBtn').onclick=async function(){
  if(!window.audioBuffer)return;
  if(typeof VideoEncoder==='undefined'){setStatus('Fast encoding requires Chrome or Edge.');return;}
  const btn=this;
  btn.disabled=true;
  const pBar=document.getElementById('progressBar'),pFill=document.getElementById('progressFill');
  pBar.style.display='block';pFill.style.width='0%';
  if(source){try{source.stop();}catch(e){}}
  playing=false;
  try{
    const buf=window.audioBuffer,fps=30,dur=buf.duration,fadeOut=5;
    const totalMusic=Math.ceil(dur*fps),totalFrames=totalMusic+fadeOut*fps;
    const sr=48000,numSamples=Math.ceil(dur*sr);

    // Step 1a: Pre-analyze audio offline (separate context for analysis)
    setStatus('Analyzing audio...');btn.textContent='Analyzing...';
    const anCtx=new OfflineAudioContext(2,numSamples,sr);
    const offAn=anCtx.createAnalyser();offAn.fftSize=512;
    const anSrc=anCtx.createBufferSource();anSrc.buffer=buf;
    anSrc.connect(offAn);
    const proc=anCtx.createScriptProcessor(1024,2,2);
    offAn.connect(proc);proc.connect(anCtx.destination);
    const frames=[];
    const samplesPerFrame=Math.round(sr/fps);
    let sampleCount=0,nextFrame=0;
    proc.onaudioprocess=()=>{
      sampleCount+=1024;
      while(sampleCount>=nextFrame&&frames.length<totalFrames){
        const d=new Uint8Array(offAn.frequencyBinCount);
        offAn.getByteFrequencyData(d);
        frames.push(d);
        nextFrame+=samplesPerFrame;
      }
    };
    anSrc.start(0);
    await anCtx.startRendering();
    while(frames.length<totalFrames)frames.push(new Uint8Array(offAn.frequencyBinCount));

    // Step 1b: Clean audio render (separate context, no processor in path)
    const audioCtx2=new OfflineAudioContext(2,numSamples,sr);
    const audioSrc=audioCtx2.createBufferSource();audioSrc.buffer=buf;
    audioSrc.connect(audioCtx2.destination);audioSrc.start(0);
    const rendered=await audioCtx2.startRendering();
    pFill.style.width='10%';

    // Step 2: Encode video (music frames + fade-out)
    setStatus('Encoding video...');
    const vOut=[];
    const vEnc=new VideoEncoder({output:(chunk,meta)=>{const d=new Uint8Array(chunk.byteLength);chunk.copyTo(d);vOut.push({data:d,ts:chunk.timestamp,kf:chunk.type==='key'});},error:e=>{throw e;}});
    vEnc.configure({codec:'vp8',width:W,height:H,bitrate:8000000,framerate:fps});
    const lastFrame=frames[frames.length-1]||new Uint8Array(256);
    const fadeFrames=fadeOut*fps;
    for(let i=0;i<totalFrames;i++){
      let frameData;
      if(i<totalMusic){
        frameData=frames[i]||new Uint8Array(256);
      } else {
        // Fade out: lerp last frame data toward zero
        const t=1-(i-totalMusic)/fadeFrames;
        frameData=new Uint8Array(lastFrame.length);
        for(let j=0;j<lastFrame.length;j++) frameData[j]=Math.round(lastFrame[j]*t*t);
      }
      drawFrame(frameData);
      const vf=new VideoFrame(C,{timestamp:Math.round(i*1000000/fps)});
      vEnc.encode(vf,{keyFrame:i%150===0});vf.close();
      if(vEnc.encodeQueueSize>10)await new Promise(r=>setTimeout(r,1));
      if(i%30===0){pFill.style.width=(10+i/totalFrames*55)+'%';btn.textContent='Encoding video... '+Math.round(i/totalFrames*100)+'%';await new Promise(r=>setTimeout(r,0));}
    }
    await vEnc.flush();vEnc.close();
    pFill.style.width='70%';

    // Step 3: Encode audio from clean render
    setStatus('Encoding audio...');btn.textContent='Encoding audio...';
    let opusPriv=null;const aOut=[];
    const aEnc=new AudioEncoder({output:(chunk,meta)=>{if(meta?.decoderConfig?.description)opusPriv=new Uint8Array(meta.decoderConfig.description);const d=new Uint8Array(chunk.byteLength);chunk.copyTo(d);aOut.push({data:d,ts:chunk.timestamp});},error:e=>{throw e;}});
    aEnc.configure({codec:'opus',sampleRate:sr,numberOfChannels:2,bitrate:128000});
    const nCh=rendered.numberOfChannels,nF=rendered.length,ch0=rendered.getChannelData(0),ch1=nCh>1?rendered.getChannelData(1):ch0;
    const totalAudioSamples=nF+fadeOut*sr;
    for(let o=0;o<totalAudioSamples;o+=960){
      const n=Math.min(960,totalAudioSamples-o),d=new Float32Array(2*n);
      if(o<nF){
        const end=Math.min(o+n,nF),count=end-o;
        d.set(ch0.subarray(o,end),0);d.set(ch1.subarray(o,end),n);
        // Zero-fill remainder if chunk straddles the boundary
        // (already zero from Float32Array init)
      }
      // Samples beyond nF are silence (already zero)
      const ad=new AudioData({format:'f32-planar',sampleRate:sr,numberOfFrames:n,numberOfChannels:2,timestamp:Math.round(o/sr*1000000),data:d.buffer});
      aEnc.encode(ad);ad.close();
    }
    await aEnc.flush();aEnc.close();
    pFill.style.width='85%';

    // Default OpusHead if encoder didn't provide one
    if(!opusPriv){opusPriv=new Uint8Array(19);opusPriv.set(new TextEncoder().encode('OpusHead'));const dv=new DataView(opusPriv.buffer);dv.setUint8(8,1);dv.setUint8(9,2);dv.setUint16(10,312,true);dv.setUint32(12,48000,true);}

    // Step 4: Mux & download
    setStatus('Building file...');btn.textContent='Building file...';
    const webm=buildWebM(vOut,aOut,W,H,(dur+fadeOut)*1000,opusPriv);
    pFill.style.width='100%';
    const blob=new Blob([webm],{type:'video/webm'});
    const dlName=(imgName||'mortek-music-video')+'.webm';
    const a=document.createElement('a');const url=URL.createObjectURL(blob);a.href=url;a.download=dlName;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    setStatus('Done! Video saved.');
    // Restart preview
    initAudio(buf);
  }catch(err){setStatus('Error: '+err.message);console.error(err);}
  finally{btn.disabled=false;btn.textContent='Download Video';pBar.style.display='none';}
};

function setStatus(t){document.getElementById('status').textContent=t;}
loop();
</script>
</div>

<script>
// Login gate
const H_VALID='cd8c10325c09bbd38f2c66321f2ba7bd29844cc6';
function sha1(s){return crypto.subtle.digest('SHA-1',new TextEncoder().encode(s)).then(b=>Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''));}
async function doLogin(){
  const u=document.getElementById('loginUser').value;
  const p=document.getElementById('loginPass').value;
  const h=await sha1(u+':'+p);
  if(h!==H_VALID){document.getElementById('loginErr').textContent='Wrong username or password';return;}
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('appContent').classList.remove('hidden');
  sessionStorage.setItem('mv_auth','1');
}
// Check if already authenticated this session
if(sessionStorage.getItem('mv_auth')==='1'){
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('appContent').classList.remove('hidden');
}
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('loginPass').onkeydown=e=>{if(e.key==='Enter')doLogin();};
document.getElementById('loginUser').onkeydown=e=>{if(e.key==='Enter')document.getElementById('loginPass').focus();};
</script>
